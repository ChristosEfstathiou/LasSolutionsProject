# outbound system configuration
# change values here without touching the code
 
# low stock alert threshold
LOW_STOCK_LIMIT=30
 
# enable order logging (Y/N)
ENABLE_ORDER_LOGGING=Y
 
# auto-fail order if stock is insufficient (Y/N)
AUTO_FAIL_ON_SHORTAGE=Y
 
# default status for new orders
DEFAULT_ORDER_STATUS=RECEIVED
 
# max rows returned in reports
MAX_REPORT_ROWS=1000
 
# database connection string
DB_CONN=localhost/XEPDB1